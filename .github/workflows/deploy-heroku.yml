name: Deploy to Heroku

# Every push to main triggers this workflow, which mirrors the commit to
# Heroku's git remote. Requires one secret in GitHub:
#   HEROKU_API_KEY  — a dedicated authorization token created with
#                     `heroku authorizations:create`. Do NOT reuse your
#                     personal `heroku auth:token`.
#
# Heroku no longer accepts HTTP basic auth on git.heroku.com, so the
# workflow installs the Heroku CLI and lets it handle credentials via the
# HEROKU_API_KEY env var (writes a proper ~/.netrc internally). The Heroku
# build (buildpack heroku/nodejs) still runs on Heroku's side.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: heroku-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Heroku
    runs-on: ubuntu-latest
    env:
      HEROKU_APP_NAME: rohu-marketing-web
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Deploy to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          if [ -z "$HEROKU_API_KEY" ]; then
            echo "::error::HEROKU_API_KEY secret is not set. Add it in"
            echo "::error::GitHub → Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi
          cat > "$HOME/.netrc" <<EOF
          machine api.heroku.com
            login ci@rohu-solutions.com
            password $HEROKU_API_KEY
          machine git.heroku.com
            login ci@rohu-solutions.com
            password $HEROKU_API_KEY
          EOF
          chmod 600 "$HOME/.netrc"
          heroku git:remote -a "$HEROKU_APP_NAME"
          git push --force heroku HEAD:main
